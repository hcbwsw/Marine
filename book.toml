[book]
title = "船舶新能源动力系统知识库"
description = "从规范到实操的工程知识库"
language = "zh"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = ""
edit-url-template = ""
additional-css = ["theme/css/general.css", "theme/css/index.css"]
additional-js = ["theme/calc-common.js"]
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
